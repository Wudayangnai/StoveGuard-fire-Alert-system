<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Fire & Gas Safety Monitor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ebebe1;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #03230d; }
        
        /* The Big Alert Box */ 
        #alert-box {
            padding: 20px;
            margin: 20px auto;
            width: 90%;
            max-width: 600px;
            border-radius: 12px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background-color: #22893a; /* Green by default */
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: background-color 0.3s ease;
        }

        /* Container for Sensor Cards */
        .dashboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        /* Individual Sensor Cards */
        .card {
            background: rgb(179, 224, 199);
            width: 250px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .card h2 {
            margin: 0;
            font-size: 18px;
            color: #000000;
        }
        .value {
            font-size: 40px;
            font-weight: bold;
            color: #000000;
            margin: 10px 0;
        }
        .unit { font-size: 20px; color: #000000; }
        
        /* Icons */
        .icon { font-size: 40px; margin-bottom: 10px; display: block;}
    </style>
</head>
<body>

    <h1>🏡 Home Safety Dashboard</h1>

    <div id="alert-box">Loading System Status...</div>

    <div class="dashboard">
        <div class="card">
            <span class="icon">🌡️</span>
            <h2>Temperature</h2>
            <div class="value"><span id="temp">--</span><span class="unit">°C</span></div>
        </div>

        <div class="card">
            <span class="icon">💧</span>
            <h2>Humidity</h2>
            <div class="value"><span id="hum">--</span><span class="unit">%</span></div>
        </div>

        <div class="card">
            <span class="icon">⛽</span>
            <h2>Gas Sensor Raw</h2>
            <div class="value"><span id="gas-level">--</span></div> 
            <div style="font-size: 12px; color: #555;">(Threshold: 2000)</div>
        </div>
    </div>

    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        // --------------------------------------------------------------
        // ⚠️ YOUR FIREBASE CONFIGURATION ⚠️
        // --------------------------------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyBS3l2f5IWCTOFOrohgtR2fE_awAINNf7E",
            authDomain: "final-project-285b6.firebaseapp.com",
            databaseURL: "https://final-project-285b6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "final-project-285b6",
            storageBucket: "final-project-285b6.firebasestorage.app",
            messagingSenderId: "970972725232",
            appId: "1:970972725232:web:d0501b71b74f426eece735",
            measurementId: "G-1KBSBR1CYG"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- REFERENCES TO DATA ---
        // These paths must match the JSON structure in your ESP32 Code
        const alertRef = ref(db, 'status/alert');
        const tempRef = ref(db, 'sensors/temperature');
        const humRef = ref(db, 'sensors/humidity');
        
        // UPDATE: Pointing to 'gas_level' instead of 'gas_status'
        const gasRef = ref(db, 'sensors/gas_level'); 

        // --- 1. LISTEN FOR ALERTS (Main Status) ---
        onValue(alertRef, (snapshot) => {
            const status = snapshot.val();
            const alertBox = document.getElementById('alert-box');
            
            // Show the exact status message from ESP32 (e.g., "GAS LEAK", "FIRE DETECTED")
            alertBox.innerText = status || "Waiting for data...";

            // Change Color based on status
            if (status === "SAFE") {
                alertBox.style.backgroundColor = "#28a745"; // Green
            } else {
                alertBox.style.backgroundColor = "#dc3545"; // Red for ANY danger
                
                // Optional: Flash the background if dangerous
                alertBox.style.animation = "flash 1s infinite";
            }
        });

        // --- 2. LISTEN FOR TEMP ---
        onValue(tempRef, (snapshot) => {
            document.getElementById('temp').innerText = snapshot.val();
        });

        // --- 3. LISTEN FOR HUMIDITY ---
        onValue(humRef, (snapshot) => {
            document.getElementById('hum').innerText = snapshot.val();
        });

        // --- 4. LISTEN FOR GAS LEVEL (Raw Number) ---
        onValue(gasRef, (snapshot) => {
            const val = snapshot.val();
            const gasEl = document.getElementById('gas-level');
            gasEl.innerText = val;
            
            // Visual feedback for Gas Level
            // If the raw value is close to your threshold (2000), turn text orange/red
            if (val > 1500) {
                gasEl.style.color = "#d63384"; // Warning color
            } else {
                gasEl.style.color = "black";
            }
        });

    </script>

    <style>
        /* Add a flashing animation for danger */
        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</body>
</html>
